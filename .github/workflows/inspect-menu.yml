name: Inspect Live Menu HTML

on:
  workflow_dispatch:
  push:
    branches: ["claude/fix-layout-issues-JVbx3"]

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Inspect mobile menu DOM and write findings
        run: |
          cat > inspect.js << 'JSEOF'
          const { chromium } = require('playwright');
          const fs = require('fs');
          const out = [];
          const log = (...a) => { const s = a.join(' '); console.log(s); out.push(s); };

          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            await page.setViewportSize({ width: 390, height: 844 });

            log('Navigating to site...');
            await page.goto('https://www.advanceapractice.com', { waitUntil: 'networkidle', timeout: 30000 });
            await page.waitForTimeout(2000);

            // Dump ALL buttons before clicking anything
            const allBtns = await page.evaluate(() =>
              Array.from(document.querySelectorAll('button, [role="button"]')).map(el => ({
                tag: el.tagName, id: el.id, cls: el.className,
                txt: el.textContent.trim().substring(0,60),
                vis: el.offsetWidth > 0 && el.offsetHeight > 0,
                w: el.offsetWidth, h: el.offsetHeight,
                html: el.outerHTML.substring(0,400)
              }))
            );
            log('\n=== ALL BUTTONS ===');
            allBtns.forEach((b,i) => log(`BTN[${i}] vis=${b.vis} ${b.w}x${b.h} id="${b.id}" cls="${b.cls}" txt="${b.txt}"\n  HTML: ${b.html}`));

            // Click first visible small button (hamburger)
            let clicked = false;
            for (const b of allBtns) {
              if (b.vis && b.w < 120) {
                log(`\nClicking: ${b.cls} | ${b.txt}`);
                await page.click(`button >> nth=0`).catch(()=>{});
                clicked = true;
                break;
              }
            }
            await page.waitForTimeout(1500);

            // Body/html classes after click
            const classes = await page.evaluate(() => ({
              body: document.body.className,
              html: document.documentElement.className
            }));
            log('\n=== BODY CLASS (after menu open) ===', classes.body);
            log('=== HTML CLASS (after menu open) ===', classes.html);

            // All visible positioned panels
            const panels = await page.evaluate(() =>
              Array.from(document.querySelectorAll('*')).filter(el => {
                const s = window.getComputedStyle(el);
                return (s.position==='fixed'||s.position==='absolute') &&
                  el.offsetWidth>100 && el.offsetHeight>150 &&
                  s.display!=='none' && s.visibility!=='hidden';
              }).map(el => ({
                tag: el.tagName, id: el.id, cls: el.className,
                w: el.offsetWidth, h: el.offsetHeight,
                pos: window.getComputedStyle(el).position,
                html: el.outerHTML.substring(0,1200)
              }))
            );
            log('\n=== VISIBLE PANELS ===');
            panels.forEach((p,i) => log(`PANEL[${i}] ${p.tag}#${p.id}.${p.cls} ${p.w}x${p.h}\n${p.html}\n---`));

            // Everything that could be a close button
            const closes = await page.evaluate(() =>
              Array.from(document.querySelectorAll('*')).filter(el => {
                const t = (el.textContent||'').trim();
                const c = (el.className||'').toString().toLowerCase();
                const l = (el.getAttribute('aria-label')||'').toLowerCase();
                const r = el.getBoundingClientRect();
                return r.width > 0 && r.height > 0 && (
                  t==='×'||t==='✕'||t==='✖'||t==='x'||t==='X'||t==='close'||t==='Close'||
                  c.includes('close')||l.includes('close')
                );
              }).map(el => {
                const r = el.getBoundingClientRect();
                return {
                  tag: el.tagName, id: el.id, cls: el.className,
                  txt: el.textContent.trim().substring(0,40),
                  lbl: el.getAttribute('aria-label')||'',
                  x: Math.round(r.x), y: Math.round(r.y),
                  w: Math.round(r.width), h: Math.round(r.height),
                  html: el.outerHTML.substring(0,500)
                };
              })
            );
            log('\n=== CLOSE CANDIDATES ===');
            closes.forEach((c,i) => log(`CLOSE[${i}] ${c.tag}#${c.id}.${c.cls} @(${c.x},${c.y}) ${c.w}x${c.h} txt="${c.txt}" lbl="${c.lbl}"\n  HTML: ${c.html}`));

            fs.writeFileSync('menu-findings.txt', out.join('\n'));
            log('\nWrote menu-findings.txt');
            await browser.close();
          })().catch(e => { fs.writeFileSync('menu-findings.txt', 'ERROR: '+e.message); console.error(e); process.exit(1); });
          JSEOF
          node inspect.js

      - name: Commit findings back to branch
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add menu-findings.txt
          git commit -m "ci: add menu inspection findings [skip ci]" || echo "nothing to commit"
          git push origin claude/fix-layout-issues-JVbx3
