name: Inject Fix via WP Admin Theme Editor

on:
  push:
    branches: ["claude/fix-layout-issues-JVbx3"]
  workflow_dispatch:

jobs:
  inject:
    runs-on: ubuntu-latest
    env:
      WP_URL: "https://www.advanceapractice.com"
      WP_USER: "dev"
      WP_PASS: "maHXL1ImgcdU*kZVz5tcXu%i"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: npx playwright install chromium --with-deps 2>&1 | tail -5

      - name: Login to WP Admin and inject JS fix via Theme Editor
        run: |
          cat > wp-inject.js << 'JSEOF'
          const { chromium } = require('playwright');
          const fs = require('fs');

          const WP   = process.env.WP_URL;
          const USER = process.env.WP_USER;
          const PASS = process.env.WP_PASS;

          const FIX_CODE = `

// === AAP Mobile Menu Fix (injected) ===
add_action('wp_footer', function() { ?>
<script id="aap-menu-fix">
(function(){
  // Click the hamburger toggle to close (uses theme's own logic)
  function getHamburger() {
    return document.querySelector(
      '[aria-expanded="true"], .menu-toggle.is-active, .hamburger.is-active, ' +
      '.mobile-toggle.active, [class*="toggle"][class*="active"], ' +
      '[class*="hamburger"][class*="active"], [class*="menu"][class*="open"] button'
    );
  }
  function closeByToggle() {
    var h = document.querySelector('[aria-expanded="true"]');
    if (h) { h.click(); return true; }
    return false;
  }
  function closeByClass() {
    var was = {};
    document.body.className.split(/\s+/).forEach(function(c){ was[c]=1; });
    ['menu-open','nav-open','mobile-open','mobile-menu-open','mobile-nav-open',
     'is-menu-open','overlay-active','js-nav-open','off-canvas-open',
     'menu-is-open','mobile-menu-active'].forEach(function(c){
      document.body.classList.remove(c);
      document.documentElement.classList.remove(c);
    });
    document.querySelectorAll('*').forEach(function(el){
      var s = window.getComputedStyle(el);
      if (s.position==='static') return;
      el.classList.remove('open','is-open','active','is-active','show',
        'visible','toggled','expanded','opened','in','menu-open');
    });
    document.body.style.overflow = '';
    document.documentElement.style.overflow = '';
  }
  function closeMenu() {
    if (!closeByToggle()) closeByClass();
  }

  // Wire top-zone of every visible fixed/absolute panel
  var wired = new Set();
  function scan() {
    document.querySelectorAll('*').forEach(function(el){
      if (wired.has(el)) return;
      var s = window.getComputedStyle(el);
      if ((s.position==='fixed'||s.position==='absolute') &&
          el.offsetWidth > window.innerWidth*0.25 &&
          el.offsetHeight > window.innerHeight*0.35 &&
          s.display !== 'none' && s.visibility !== 'hidden') {
        wired.add(el);
        // Tap in top 180px of panel = close
        el.addEventListener('click', function(e){
          var r = el.getBoundingClientRect();
          if (e.clientY <= r.top + 180) {
            var n = e.target;
            while (n && n !== el) {
              if (n.tagName==='A' && n.href &&
                  !n.href.endsWith('#')) return;
              n = n.parentElement;
            }
            e.stopPropagation();
            closeMenu();
          }
        }, true);
        // Also wire overlay siblings
        if (el.parentElement) {
          Array.from(el.parentElement.children).forEach(function(sib){
            if (sib===el || wired.has(sib)) return;
            var ss = window.getComputedStyle(sib);
            if ((ss.position==='fixed'||ss.position==='absolute') &&
                sib.offsetWidth > window.innerWidth*0.2) {
              wired.add(sib);
              sib.addEventListener('click', closeMenu, true);
            }
          });
        }
      }
    });
  }
  new MutationObserver(scan).observe(document.documentElement,
    {subtree:true,childList:true,attributes:true,attributeFilter:['class','style']});
  document.addEventListener('keydown',function(e){ if(e.key==='Escape') closeMenu(); });
  scan();
})();
</script>
<?php }, 99);
// === END AAP Fix ===`;

          (async () => {
            const browser = await chromium.launch({ args: ['--no-sandbox'] });
            const page = await browser.newPage();

            // ── Step 1: Log in ──────────────────────────────────
            console.log('Logging in to WP Admin...');
            await page.goto(`${WP}/wp-login.php`, { waitUntil: 'load', timeout: 30000 });
            await page.fill('#user_login', USER);
            await page.fill('#user_pass', PASS);
            await page.click('#wp-submit');
            await page.waitForURL(/wp-admin/, { timeout: 20000 });
            console.log('Logged in OK. URL:', page.url());

            // ── Step 2: Open Theme Editor ───────────────────────
            console.log('Opening Theme Editor...');
            await page.goto(`${WP}/wp-admin/theme-editor.php`, { waitUntil: 'load', timeout: 20000 });

            // ── Step 3: Find functions.php link ─────────────────
            console.log('Looking for functions.php...');
            const link = await page.$('a[href*="file=functions.php"], a:has-text("functions.php"), #template a:has-text("functions")');
            if (!link) {
              // Try direct URL
              await page.goto(`${WP}/wp-admin/theme-editor.php?file=functions.php`, { waitUntil: 'load' });
            } else {
              await link.click();
              await page.waitForLoadState('load');
            }
            console.log('Theme editor URL:', page.url());

            // ── Step 4: Get current functions.php content ───────
            const textarea = await page.$('#newcontent');
            if (!textarea) throw new Error('Could not find editor textarea #newcontent');
            const current = await textarea.inputValue();
            console.log('Got functions.php, length:', current.length);

            // Skip if already injected
            if (current.includes('AAP Mobile Menu Fix')) {
              console.log('Fix already present — updating...');
              const cleaned = current.replace(/\n\/\/ === AAP Mobile Menu Fix[\s\S]*?\/\/ === END AAP Fix ===/g, '');
              await textarea.fill(cleaned + FIX_CODE);
            } else {
              await textarea.fill(current + FIX_CODE);
            }

            // ── Step 5: Save ────────────────────────────────────
            console.log('Saving...');
            await page.click('#submit');
            await page.waitForLoadState('load', { timeout: 15000 });
            const saved = await page.content();
            if (saved.includes('updated successfully') || saved.includes('File edited successfully')) {
              console.log('SUCCESS: functions.php saved!');
            } else if (saved.includes('error') || saved.includes('Error')) {
              console.log('POSSIBLE ERROR in save. Page text:', saved.substring(0,500));
            } else {
              console.log('Save attempted. Page snippet:', saved.substring(0,300));
            }

            await browser.close();
          })().catch(e => { console.error('FATAL:', e.message); process.exit(1); });
          JSEOF
          node wp-inject.js
