name: Inject Fix via WP Admin (curl)

on:
  push:
    branches: ["claude/fix-layout-issues-JVbx3"]
  workflow_dispatch:

jobs:
  inject:
    runs-on: ubuntu-latest
    env:
      WP_URL: "https://www.advanceapractice.com"
      WP_USER: "dev"
      WP_PASS: "maHXL1ImgcdU*kZVz5tcXu%i"

    steps:
      - uses: actions/checkout@v4

      - name: Inject JS fix into functions.php via WP Admin HTTP
        run: |
          python3 << 'PYEOF'
          import urllib.request, urllib.parse, urllib.error, http.cookiejar, re, os, sys

          WP   = os.environ['WP_URL']
          USER = os.environ['WP_USER']
          PASS = os.environ['WP_PASS']

          FIX = """

// === AAP_MENU_FIX_START ===
add_action('wp_footer', function() { ?>
<script id="aap-menu-fix">
(function(){
  function closeByToggle() {
    var h = document.querySelector('[aria-expanded="true"]');
    if (h) { h.click(); return true; }
    return false;
  }
  function closeByClass() {
    ['menu-open','nav-open','mobile-open','mobile-menu-open','mobile-nav-open',
     'is-menu-open','overlay-active','js-nav-open','off-canvas-open',
     'menu-is-open','mobile-menu-active'].forEach(function(c){
      document.body.classList.remove(c);
      document.documentElement.classList.remove(c);
    });
    document.querySelectorAll('*').forEach(function(el){
      var s = window.getComputedStyle(el);
      if (s.position==='static') return;
      el.classList.remove('open','is-open','active','is-active','show',
        'visible','toggled','expanded','opened','in');
    });
    document.body.style.overflow = '';
    document.documentElement.style.overflow = '';
  }
  function closeMenu() { if (!closeByToggle()) closeByClass(); }
  var wired = new Set();
  function scan() {
    document.querySelectorAll('*').forEach(function(el){
      if (wired.has(el)) return;
      var s = window.getComputedStyle(el);
      if ((s.position==='fixed'||s.position==='absolute') &&
          el.offsetWidth > window.innerWidth*0.25 &&
          el.offsetHeight > window.innerHeight*0.35 &&
          s.display !== 'none' && s.visibility !== 'hidden') {
        wired.add(el);
        el.addEventListener('click', function(e){
          var r = el.getBoundingClientRect();
          if (e.clientY <= r.top + 180) {
            var n = e.target;
            while (n && n !== el) {
              if (n.tagName==='A' && n.href && !n.href.endsWith('#')) return;
              n = n.parentElement;
            }
            e.stopPropagation();
            closeMenu();
          }
        }, true);
        if (el.parentElement) {
          Array.from(el.parentElement.children).forEach(function(sib){
            if (sib===el || wired.has(sib)) return;
            var ss = window.getComputedStyle(sib);
            if ((ss.position==='fixed'||ss.position==='absolute') &&
                sib.offsetWidth > window.innerWidth*0.2) {
              wired.add(sib);
              sib.addEventListener('click', closeMenu, true);
            }
          });
        }
      }
    });
  }
  new MutationObserver(scan).observe(document.documentElement,
    {subtree:true,childList:true,attributes:true,attributeFilter:['class','style']});
  document.addEventListener('keydown',function(e){ if(e.key==='Escape') closeMenu(); });
  scan();
})();
</script>
<?php }, 99);
// === AAP_MENU_FIX_END ==="""

          jar  = http.cookiejar.CookieJar()
          opener = urllib.request.build_opener(urllib.request.HTTPCookieProcessor(jar))
          opener.addheaders = [('User-Agent', 'Mozilla/5.0')]

          # ── 1. Login ──────────────────────────────────────────
          print('Logging in...')
          login_data = urllib.parse.urlencode({
              'log': USER, 'pwd': PASS,
              'wp-submit': 'Log In',
              'redirect_to': '/wp-admin/',
              'testcookie': '1'
          }).encode()
          opener.addheaders += [('Cookie', 'wordpress_test_cookie=WP+Cookie+check')]
          resp = opener.open(f'{WP}/wp-login.php', login_data, timeout=30)
          final_url = resp.geturl()
          print('After login URL:', final_url)
          if 'wp-admin' not in final_url and 'wp-login' in final_url:
              body = resp.read().decode('utf-8', errors='ignore')
              print('Login failed. Page snippet:', body[:300])
              sys.exit(1)
          print('Login OK')

          # ── 2. Fetch theme editor ─────────────────────────────
          print('Fetching theme editor...')
          resp = opener.open(f'{WP}/wp-admin/theme-editor.php?file=functions.php', timeout=30)
          html = resp.read().decode('utf-8', errors='ignore')
          print('Editor page length:', len(html))

          # ── 3. Extract nonce ──────────────────────────────────
          nonce_match = re.search(r'"nonce"\s*:\s*"([a-f0-9]+)"', html) or \
                        re.search(r'name="_wpnonce"[^>]*value="([^"]+)"', html) or \
                        re.search(r'wp_nonce["\s]*[=:]["\s]*([a-f0-9]+)', html)
          if not nonce_match:
              # Try alternate pattern
              nonce_match = re.search(r'_wpnonce=([a-f0-9]+)', html)
          nonce = nonce_match.group(1) if nonce_match else ''
          print('Nonce:', nonce or '(not found)')

          # ── 4. Extract current file content ───────────────────
          content_match = re.search(r'<textarea[^>]+id="newcontent"[^>]*>([\s\S]*?)</textarea>', html)
          if not content_match:
              print('ERROR: Could not find #newcontent textarea')
              print('Page snippet:', html[1000:2000])
              sys.exit(1)
          import html as html_module
          current = html_module.unescape(content_match.group(1))
          print('Got functions.php, length:', len(current))

          # ── 5. Remove old fix & append new ────────────────────
          cleaned = re.sub(r'\n// === AAP_MENU_FIX_START ===[\s\S]*?// === AAP_MENU_FIX_END ===', '', current)
          new_content = cleaned.rstrip() + FIX

          # ── 6. Get theme/file params from form ────────────────
          theme_match  = re.search(r'name="theme"[^>]*value="([^"]+)"', html)
          action_match = re.search(r'name="action"[^>]*value="([^"]*)"', html)
          theme  = theme_match.group(1)  if theme_match  else ''
          action = action_match.group(1) if action_match else 'edit-theme-plugin-file'
          print('Theme:', theme, '| Action:', action)

          # ── 7. POST updated file ──────────────────────────────
          print('Saving functions.php...')
          post_data = urllib.parse.urlencode({
              'newcontent': new_content,
              'action': action,
              'file': 'functions.php',
              'theme': theme,
              '_wpnonce': nonce,
              '_wp_http_referer': f'/wp-admin/theme-editor.php?file=functions.php&theme={theme}',
              'submit': 'Update File'
          }).encode()
          resp = opener.open(f'{WP}/wp-admin/theme-editor.php', post_data, timeout=30)
          result = resp.read().decode('utf-8', errors='ignore')
          print('Save response URL:', resp.geturl())

          if re.search(r'updated successfully|File edited successfully|file.*edited', result, re.I):
              print('SUCCESS: functions.php updated with mobile menu fix.')
          else:
              # Look for any error message
              err = re.search(r'<div[^>]+class="[^"]*error[^"]*"[^>]*>([\s\S]{0,300})', result)
              if err:
                  import html as h; print('ERROR:', h.unescape(re.sub('<[^>]+>','',err.group(1))))
              else:
                  print('Response snippet:', result[500:1000])
          PYEOF
